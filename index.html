<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ร้านของฉัน · POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --red:#E24B4A;--red-light:#FCEBEB;--red-dark:#A32D2D;
  --amber:#FAEEDA;--amber-dark:#633806;
  --bg:#F5F5F2;--surface:#FFFFFF;--border:#E0E0DC;--border2:#C8C8C2;
  --text:#1A1A18;--text2:#6B6B66;--text3:#9B9B96;
  --radius:10px;--radius-lg:14px;
  --font:'Sarabun',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:var(--font);font-size:14px;color:var(--text)}
input,button,textarea,select{font-family:var(--font);font-size:14px}

.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TOP BAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0}
.topbar-logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:600;color:var(--text)}
.topbar-logo span{color:var(--green)}
.nav{display:flex;gap:2px}
.ntab{padding:6px 14px;border-radius:var(--radius);border:none;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);background:transparent;transition:all .15s;display:flex;align-items:center;gap:5px}
.ntab:hover{background:var(--bg);color:var(--text)}
.ntab.on{background:var(--green-light);color:var(--green-dark);font-weight:600}
.clock{font-family:var(--mono);font-size:12px;color:var(--text3)}

/* PAGES */
.pg{display:none;flex:1;overflow:hidden}
.pg.on{display:flex}

/* ===== SALE PAGE ===== */
.sale-l{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.catbar{display:flex;gap:6px;padding:10px 12px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.catbar::-webkit-scrollbar{display:none}
.catbtn{padding:5px 14px;border-radius:999px;border:1px solid var(--border2);font-size:12px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text2);white-space:nowrap;transition:all .15s;flex-shrink:0}
.catbtn:hover{border-color:var(--green);color:var(--green)}
.catbtn.on{background:var(--green);border-color:var(--green);color:#fff}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;padding:12px;overflow-y:auto;flex:1;align-content:start}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 8px;cursor:pointer;text-align:center;position:relative;transition:all .15s;user-select:none}
.pcard:hover{border-color:var(--green);box-shadow:0 2px 8px rgba(29,158,117,.12);transform:translateY(-1px)}
.pcard:active{transform:scale(.97)}
.pcard.promo{border-color:#FAC775;background:linear-gradient(135deg,#FFFDF7,#FFF8E8)}
.pcard-icon{font-size:26px;margin-bottom:5px;line-height:1}
.pcard-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:2px;line-height:1.3}
.pcard-cat{font-size:10px;color:var(--text3);margin-bottom:5px}
.pcard-price{font-size:14px;font-weight:700;color:var(--green)}
.promo-badge{position:absolute;top:5px;right:5px;background:#FAC775;color:var(--amber-dark);font-size:9px;padding:1px 5px;border-radius:999px;font-weight:700}
.shot-badge{position:absolute;top:5px;left:5px;background:var(--green-light);color:var(--green-dark);font-size:9px;padding:1px 5px;border-radius:999px;font-weight:700}

/* ORDER PANEL */
.order-panel{width:300px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.order-hdr{padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.order-hdr-row{display:flex;justify-content:space-between;align-items:center}
.order-title{font-size:14px;font-weight:600;color:var(--text)}
.bill-id{font-family:var(--mono);font-size:11px;color:var(--green);font-weight:500;background:var(--green-light);padding:2px 8px;border-radius:999px}
.order-items{flex:1;overflow-y:auto;padding:8px}
.empty-msg{padding:2.5rem 1rem;text-align:center;color:var(--text3);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:.4;display:block}

.oi{display:flex;align-items:flex-start;gap:8px;padding:8px;border-radius:var(--radius);margin-bottom:4px;background:var(--bg);border:1px solid var(--border)}
.oi-info{flex:1;min-width:0}
.oi-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.3}
.oi-sub{font-size:10px;color:var(--text3);margin-top:1px}
.oi-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.oi-price{font-size:12px;font-weight:600;color:var(--text2)}
.qty-ctrl{display:flex;align-items:center;gap:4px}
.qbtn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border2);background:var(--surface);font-size:14px;line-height:1;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;transition:all .1s}
.qbtn:hover{border-color:var(--green);color:var(--green)}
.qval{font-size:12px;font-weight:600;min-width:16px;text-align:center;color:var(--text)}

.order-footer{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0}
.disc-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;background:var(--bg);border-radius:var(--radius);padding:6px 10px;border:1px solid var(--border)}
.disc-label{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;flex:1;font-weight:500}
.disc-input{width:70px;padding:3px 6px;border-radius:6px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-weight:600;text-align:right}
.disc-input:focus{outline:none;border-color:var(--green)}
.sum-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:3px}
.sum-disc{color:var(--red);font-weight:500}
.sum-total{display:flex;justify-content:space-between;font-size:17px;font-weight:700;color:var(--text);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);margin-bottom:12px}
.pay-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pay-btn{padding:10px 8px;border-radius:var(--radius);border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.pay-btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
.pay-btn.cash{background:var(--green);color:#fff}
.pay-btn.cash:hover:not(:disabled){background:var(--green-dark)}
.pay-btn.transfer{background:var(--blue);color:#fff}
.pay-btn.transfer:hover:not(:disabled){background:#0D4A84}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
.overlay.on{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:22px;width:290px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:3px;color:var(--text)}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.shot-ctrl{display:flex;align-items:center;gap:14px;margin-bottom:16px;background:var(--bg);border-radius:var(--radius);padding:12px}
.shot-bigbtn{width:40px;height:40px;border-radius:50%;border:2px solid var(--border2);background:var(--surface);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-weight:300;transition:all .1s}
.shot-bigbtn:hover{border-color:var(--green);color:var(--green)}
.shot-val{font-size:28px;font-weight:700;min-width:40px;text-align:center;color:var(--text)}
.shot-price{font-size:13px;color:var(--green);font-weight:600;margin-left:auto}
.btn-row{display:flex;gap:8px}
.btn-primary{flex:1;padding:10px;border-radius:var(--radius);border:none;background:var(--green);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:var(--green-dark)}
.btn-sec{flex:1;padding:10px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;font-size:14px;cursor:pointer;color:var(--text2);transition:all .15s}
.btn-sec:hover{background:var(--bg)}

/* BILLS PAGE */
.bills-pg{flex:1;flex-direction:column;overflow:hidden}
.bills-toolbar{padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0}
.search-input{flex:1;padding:7px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;transition:border-color .15s}
.search-input:focus{outline:none;border-color:var(--green)}
.export-btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .15s;flex-shrink:0}
.export-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-light)}
.bills-list{flex:1;overflow-y:auto;padding:12px}
.bill-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.bill-card:hover{border-color:var(--green);box-shadow:0 2px 8px rgba(29,158,117,.1)}
.bill-card.cancelled{border-color:#F09595;background:#FFF8F8}
.bc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.bc-id{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--green)}
.bc-id.cancelled{color:var(--red-dark)}
.bc-time{font-size:11px;color:var(--text3)}
.bc-items{font-size:12px;color:var(--text2);margin-bottom:6px;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.bc-bot{display:flex;justify-content:space-between;align-items:center}
.bc-total{font-size:15px;font-weight:700;color:var(--text)}
.bc-badge{font-size:11px;padding:2px 9px;border-radius:999px;font-weight:600}
.bc-badge.cash{background:var(--green-light);color:var(--green-dark)}
.bc-badge.transfer{background:var(--blue-light);color:var(--blue)}
.bc-badge.cancelled{background:var(--red-light);color:var(--red-dark)}

/* BILL DETAIL */
.bd-modal{background:var(--surface);border-radius:var(--radius-lg);padding:22px;width:340px;max-height:88vh;overflow-y:auto;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.2)}
.bd-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.bd-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);line-height:1;padding:0;transition:color .15s}
.bd-close:hover{color:var(--text)}
.bd-table{width:100%;font-size:13px;border-collapse:collapse;margin-bottom:10px}
.bd-table tr td{padding:5px 0;color:var(--text)}
.bd-table tr td:last-child{text-align:right;font-weight:500}
.bd-table tr:not(:last-child) td{border-bottom:1px solid var(--border)}
.bd-sep{border-top:2px dashed var(--border);margin:10px 0}
.bd-total{display:flex;justify-content:space-between;font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px}
.cancelled-box{background:var(--red-light);border:1px solid #F09595;border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--red-dark);margin-bottom:12px;line-height:1.6}
.cancel-area{margin-top:12px;border-top:1px solid var(--border);padding-top:14px}
.cancel-area label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px}
.cancel-reason{width:100%;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;margin-bottom:10px;resize:none;transition:border-color .15s}
.cancel-reason:focus{outline:none;border-color:var(--red)}
.btn-danger{width:100%;padding:10px;border-radius:var(--radius);border:none;background:var(--red);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-danger:hover{background:#C43B3A}

/* REPORT PAGE */
.report-pg{flex:1;overflow-y:auto;padding:16px;flex-direction:column}
.report-date{font-size:12px;color:var(--text3);margin-bottom:14px;font-weight:500}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.mcard{background:var(--surface);border-radius:var(--radius-lg);padding:14px;border:1px solid var(--border)}
.mlabel{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.mval{font-size:22px;font-weight:700;color:var(--text)}
.msub{font-size:11px;color:var(--text3);margin-top:2px}
.section-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.pay-split{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.pscard{border-radius:var(--radius-lg);padding:14px;border:1px solid}
.pscard.cash{background:var(--green-light);border-color:#9FE1CB}
.pscard.transfer{background:var(--blue-light);border-color:#B5D4F4}
.ps-label{font-size:11px;margin-bottom:4px;font-weight:600}
.pscard.cash .ps-label{color:var(--green-dark)}
.pscard.transfer .ps-label{color:var(--blue)}
.ps-val{font-size:20px;font-weight:700}
.pscard.cash .ps-val{color:var(--green-dark)}
.pscard.transfer .ps-val{color:var(--blue)}
.ps-count{font-size:11px;margin-top:2px;opacity:.7}
.pscard.cash .ps-count{color:var(--green-dark)}
.pscard.transfer .ps-count{color:var(--blue)}
.ti-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.ti-rank{font-size:11px;font-weight:700;color:var(--text3);min-width:18px}
.ti-name{font-size:13px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{width:80px;height:7px;background:var(--bg);border-radius:999px;overflow:hidden;flex-shrink:0}
.bar-fill{height:100%;background:var(--green);border-radius:999px;transition:width .5s ease}
.ti-cnt{font-size:11px;color:var(--text2);min-width:42px;text-align:right;font-weight:600}
.summary-box{background:linear-gradient(135deg,var(--green-light),#d0f0e4);border:1px solid #9FE1CB;border-radius:var(--radius-lg);padding:14px 16px;margin-top:16px}
.summary-title{font-size:13px;font-weight:700;color:var(--green-dark);margin-bottom:6px}
.summary-body{font-size:12px;color:var(--green-dark);line-height:1.8}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-logo">🍺 <span>ร้านของฉัน</span> &nbsp;·&nbsp; POS</div>
    <div class="nav">
      <button class="ntab on" onclick="showPg('sale',this)">🛒 ขาย</button>
      <button class="ntab" onclick="showPg('bills',this)">🧾 บิล</button>
      <button class="ntab" onclick="showPg('report',this)">📊 รายงาน</button>
    </div>
    <div class="clock" id="clock">--:--</div>
  </div>

  <!-- SALE PAGE -->
  <div id="pg-sale" class="pg on" style="flex-direction:row">
    <div class="sale-l">
      <div class="catbar" id="catbar"></div>
      <div class="pgrid" id="pgrid"></div>
    </div>
    <div class="order-panel">
      <div class="order-hdr">
        <div class="order-hdr-row">
          <span class="order-title">ออเดอร์</span>
          <span class="bill-id" id="cur-bill-id">-</span>
        </div>
      </div>
      <div class="order-items" id="order-items">
        <div class="empty-msg"><span class="empty-icon">🍺</span>ยังไม่มีรายการ<br>กดสินค้าเพื่อเพิ่ม</div>
      </div>
      <div class="order-footer">
        <div class="disc-row">
          <span class="disc-label">🏷️ ส่วนลด</span>
          <input class="disc-input" id="disc-input" type="number" min="0" value="0" oninput="renderFooter()"> บาท
        </div>
        <div class="sum-row"><span>ยอดรวม</span><span id="subtotal">฿0</span></div>
        <div class="sum-row"><span class="sum-disc">ส่วนลด</span><span id="disc-show" class="sum-disc">-฿0</span></div>
        <div class="sum-total"><span>สุทธิ</span><span id="net-total">฿0</span></div>
        <div class="pay-btns">
          <button class="pay-btn cash" id="pay-cash" disabled onclick="doPay('cash')">💵 เงินสด</button>
          <button class="pay-btn transfer" id="pay-transfer" disabled onclick="doPay('transfer')">📱 โอนเงิน</button>
        </div>
      </div>
    </div>
  </div>

  <!-- BILLS PAGE -->
  <div id="pg-bills" class="pg bills-pg">
    <div class="bills-toolbar">
      <input class="search-input" placeholder="🔍 ค้นหารหัสบิล..." oninput="renderBills(this.value)">
      <button class="export-btn" onclick="exportCSV()">📊 Export Excel</button>
    </div>
    <div class="bills-list" id="bills-list"></div>
  </div>

  <!-- REPORT PAGE -->
  <div id="pg-report" class="pg" style="overflow:hidden">
    <div class="report-pg" id="report-content"></div>
  </div>
</div>

<!-- SHOT MODAL -->
<div class="overlay" id="shot-overlay">
  <div class="modal">
    <h3 id="shot-prod-name">เหล้าปั่น</h3>
    <div class="modal-sub">ต้องการเพิ่มช็อตเหล้าไหม? ช็อตละ ฿30</div>
    <div class="shot-ctrl">
      <button class="shot-bigbtn" onclick="adjShot(-1)">−</button>
      <span class="shot-val" id="shot-val">0</span>
      <button class="shot-bigbtn" onclick="adjShot(1)">+</button>
      <span class="shot-price" id="shot-price-disp">฿0</span>
    </div>
    <div class="btn-row">
      <button class="btn-sec" onclick="closeShotModal()">ข้าม (ไม่เพิ่ม)</button>
      <button class="btn-primary" onclick="confirmShot()">เพิ่มลงบิล</button>
    </div>
  </div>
</div>

<!-- BILL DETAIL MODAL -->
<div class="overlay" id="bd-overlay" onclick="if(event.target===this)this.classList.remove('on')">
  <div class="bd-modal" id="bd-content"></div>
</div>

<script>
const PRODUCTS=[
  {id:1,cat:'เหล้า',name:'แกรนด์ กลม',price:325,icon:'🥃'},

  {id:6,cat:'เหล้าปั่น',name:'สตรอเบอร์รี่',price:159,icon:'🍓',shot:true},
  {id:7,cat:'เหล้าปั่น',name:'บลูฮาวาย',price:159,icon:'🧊',shot:true},
  {id:8,cat:'เหล้าปั่น',name:'แอปเปิ้ล',price:159,icon:'🍏',shot:true},
  {id:9,cat:'เหล้าปั่น',name:'กีวี่',price:159,icon:'🥝',shot:true},
  {id:10,cat:'เหล้าปั่น',name:'ลิ้นจี่',price:159,icon:'🍈',shot:true},
  {id:11,cat:'เหล้าปั่น',name:'เลมอนโซดา',price:159,icon:'🍋',shot:true},
  {id:12,cat:'น้ำแข็ง',name:'น้ำแข็ง',price:10,icon:'🧊'},
  {id:13,cat:'เบียร์',name:'สิงห์',price:70,icon:'🍺'},
  {id:14,cat:'เบียร์',name:'ช้าง',price:60,icon:'🍺'},
  {id:15,cat:'เบียร์',name:'ลีโอ',price:65,icon:'🍺'},
  {id:16,cat:'เบียร์',name:'สิงห์ (โปร 3 ขวด)',price:200,icon:'🍺',promo:true},
  {id:17,cat:'เบียร์',name:'สิงห์ ยกลัง',price:800,icon:'📦'},
  {id:18,cat:'เบียร์',name:'ช้าง ยกลัง',price:720,icon:'📦'},
  {id:19,cat:'เบียร์',name:'ลีโอ ยกลัง',price:750,icon:'📦'},
  {id:20,cat:'เบียร์สด',name:'เหยือก',price:179,icon:'🍺'},
  {id:21,cat:'เบียร์สด',name:'ทาวเวอร์',price:529,icon:'🍺'},
  {id:22,cat:'เบียร์สด',name:'เหยือก (โปร)',price:159,icon:'🍺',promo:true},
  {id:23,cat:'เบียร์สด',name:'ทาวเวอร์ (โปร)',price:469,icon:'🍺',promo:true},
  {id:24,cat:'อื่นๆ',name:'แลกเงินเข้าห้องน้ำ',price:1,icon:'🚻'},
  {id:25,cat:'อื่นๆ',name:'ค่าเปิดขวด',price:100,icon:'🔑'},
  {id:26,cat:'อื่นๆ',name:'ค่าแก้ว',price:2,icon:'🥂'},
  {id:27,cat:'อื่นๆ',name:'ทิชชู่',price:15,icon:'🧻'},
];
const SHOT_PRICE=30;
const CATS=['ทั้งหมด',...[...new Set(PRODUCTS.map(p=>p.cat))]];

let curCat='ทั้งหมด';
let order={};
let bills=JSON.parse(localStorage.getItem('pos_bills_v2')||'[]');
let billCounter=JSON.parse(localStorage.getItem('pos_counter_v2')||'{}');
let shotTarget=null,shotQty=0;

function save(){localStorage.setItem('pos_bills_v2',JSON.stringify(bills));localStorage.setItem('pos_counter_v2',JSON.stringify(billCounter));}
function todayStr(){const d=new Date();return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;}
function fmtDate(s){return `${s.slice(6,8)}/${s.slice(4,6)}/${s.slice(0,4)}`;}
function genBillId(){const d=todayStr();billCounter[d]=(billCounter[d]||0)+1;save();return `${d}${String(billCounter[d]).padStart(3,'0')}`;}

let currentBillId=genBillId();
document.getElementById('cur-bill-id').textContent=currentBillId;

// Clock
setInterval(()=>{
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);

// Nav
function showPg(name,btn){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById('pg-'+name).classList.add('on');
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(name==='bills')renderBills('');
  if(name==='report')renderReport();
}

// Categories
(function(){
  const bar=document.getElementById('catbar');
  bar.innerHTML=CATS.map(c=>`<button class="catbtn${c==='ทั้งหมด'?' on':''}" onclick="filterCat(this,'${c}')">${c}</button>`).join('');
})();

function filterCat(btn,cat){
  curCat=cat;
  document.querySelectorAll('.catbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderProducts();
}

function renderProducts(){
  const items=curCat==='ทั้งหมด'?PRODUCTS:PRODUCTS.filter(p=>p.cat===curCat);
  document.getElementById('pgrid').innerHTML=items.map(p=>`
    <div class="pcard${p.promo?' promo':''}" onclick="clickProduct(${p.id})">
      ${p.promo?'<span class="promo-badge">โปร</span>':''}
      ${p.shot?'<span class="shot-badge">+ช็อต</span>':''}
      <div class="pcard-icon">${p.icon}</div>
      <div class="pcard-name">${p.name}</div>
      <div class="pcard-cat">${p.cat}</div>
      <div class="pcard-price">฿${p.price}</div>
    </div>`).join('');
}
renderProducts();

function clickProduct(id){
  const p=PRODUCTS.find(x=>x.id===id);
  if(p.shot){openShotModal(p);}else{addToOrder(p,0);}
}

function openShotModal(p){
  shotTarget=p;shotQty=0;
  document.getElementById('shot-prod-name').textContent=`${p.icon} ${p.name} — ฿${p.price}`;
  document.getElementById('shot-val').textContent='0';
  document.getElementById('shot-price-disp').textContent='+฿0';
  document.getElementById('shot-overlay').classList.add('on');
}
function closeShotModal(){document.getElementById('shot-overlay').classList.remove('on');shotTarget=null;}
function adjShot(d){shotQty=Math.max(0,shotQty+d);document.getElementById('shot-val').textContent=shotQty;document.getElementById('shot-price-disp').textContent='+฿'+(shotQty*SHOT_PRICE);}
function confirmShot(){if(shotTarget)addToOrder(shotTarget,shotQty);closeShotModal();}

function addToOrder(p,shots){
  const key=`${p.id}_${shots}`;
  const finalPrice=p.price+(shots*SHOT_PRICE);
  if(order[key]){order[key].qty++;}
  else{order[key]={...p,shots,finalPrice,qty:1};}
  renderOrder();
}
function removeOne(key){if(!order[key])return;order[key].qty--;if(order[key].qty<=0)delete order[key];renderOrder();}
function addOne(key){order[key].qty++;renderOrder();}

function renderOrder(){
  const items=Object.entries(order);
  const el=document.getElementById('order-items');
  if(!items.length){
    el.innerHTML='<div class="empty-msg"><span class="empty-icon">🍺</span>ยังไม่มีรายการ<br>กดสินค้าเพื่อเพิ่ม</div>';
    renderFooter();return;
  }
  el.innerHTML=items.map(([k,it])=>`
    <div class="oi">
      <div class="oi-info">
        <div class="oi-name">${it.icon} ${it.name}</div>
        <div class="oi-sub">${it.shots>0?`+${it.shots} ช็อต (+฿${it.shots*SHOT_PRICE})`:`฿${it.price}/ชิ้น`}</div>
        <div class="qty-ctrl">
          <button class="qbtn" onclick="removeOne('${k}')">−</button>
          <span class="qval">${it.qty}</span>
          <button class="qbtn" onclick="addOne('${k}')">+</button>
        </div>
      </div>
      <div class="oi-right"><div class="oi-price">฿${it.finalPrice*it.qty}</div></div>
    </div>`).join('');
  renderFooter();
}

function renderFooter(){
  const items=Object.values(order);
  const sub=items.reduce((s,it)=>s+it.finalPrice*it.qty,0);
  const disc=Math.max(0,parseInt(document.getElementById('disc-input').value)||0);
  const net=Math.max(0,sub-disc);
  document.getElementById('subtotal').textContent='฿'+sub.toLocaleString();
  document.getElementById('disc-show').textContent='-฿'+disc.toLocaleString();
  document.getElementById('net-total').textContent='฿'+net.toLocaleString();
  const has=items.length>0;
  document.getElementById('pay-cash').disabled=!has;
  document.getElementById('pay-transfer').disabled=!has;
}

function doPay(method){
  const items=Object.values(order);
  if(!items.length)return;
  const sub=items.reduce((s,it)=>s+it.finalPrice*it.qty,0);
  const disc=Math.max(0,parseInt(document.getElementById('disc-input').value)||0);
  const net=Math.max(0,sub-disc);
  const now=new Date();
  const bill={
    id:currentBillId,
    time:now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
    date:todayStr(),
    items:items.map(it=>({name:it.name,icon:it.icon,qty:it.qty,unitPrice:it.finalPrice,shots:it.shots})),
    subtotal:sub,discount:disc,total:net,method,status:'ok',cancelReason:''
  };
  bills.unshift(bill);save();
  order={};
  document.getElementById('disc-input').value=0;
  currentBillId=genBillId();
  document.getElementById('cur-bill-id').textContent=currentBillId;
  renderOrder();
  alert(`✅ ชำระเงินสำเร็จ!\n\nบิล: ${bill.id}\nยอดสุทธิ: ฿${net.toLocaleString()}\nวิธีชำระ: ${method==='cash'?'เงินสด 💵':'โอนเงิน 📱'}`);
}

// BILLS PAGE
function renderBills(q){
  const el=document.getElementById('bills-list');
  const filtered=bills.filter(b=>!q||b.id.includes(q.trim()));
  if(!filtered.length){el.innerHTML='<div style="padding:3rem;text-align:center;color:var(--text3);font-size:13px">ไม่มีบิล</div>';return;}
  el.innerHTML=filtered.map(b=>`
    <div class="bill-card${b.status==='cancelled'?' cancelled':''}" onclick="showBillDetail('${b.id}')">
      <div class="bc-top">
        <span class="bc-id${b.status==='cancelled'?' cancelled':''}">${b.id}</span>
        <span class="bc-time">${fmtDate(b.date)} ${b.time}</span>
      </div>
      <div class="bc-items">${b.items.map(i=>`${i.icon}${i.name}${i.qty>1?' x'+i.qty:''}`).join(' · ')}</div>
      <div class="bc-bot">
        <span class="bc-total">฿${b.total.toLocaleString()}</span>
        <span class="bc-badge ${b.status==='cancelled'?'cancelled':b.method}">${b.status==='cancelled'?'❌ ยกเลิก':b.method==='cash'?'💵 เงินสด':'📱 โอนเงิน'}</span>
      </div>
      ${b.status==='cancelled'&&b.cancelReason?`<div style="font-size:11px;color:var(--red-dark);margin-top:5px;padding-top:5px;border-top:1px solid #F09595">⚠️ เหตุผล: ${b.cancelReason}</div>`:''}
    </div>`).join('');
}

function showBillDetail(id){
  const b=bills.find(x=>x.id===id);if(!b)return;
  const cancelled=b.status==='cancelled';
  document.getElementById('bd-content').innerHTML=`
    <div class="bd-hdr">
      <div>
        <div style="font-family:var(--mono);font-size:13px;font-weight:600;color:${cancelled?'var(--red-dark)':'var(--green)'}">${b.id}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px">${fmtDate(b.date)} · ${b.time} · ${cancelled?'<span style="color:var(--red-dark);font-weight:600">ยกเลิกแล้ว</span>':(b.method==='cash'?'💵 เงินสด':'📱 โอนเงิน')}</div>
      </div>
      <button class="bd-close" onclick="document.getElementById('bd-overlay').classList.remove('on')">✕</button>
    </div>
    ${cancelled?`<div class="cancelled-box">⚠️ บิลนี้ถูกยกเลิกแล้ว<br><strong>เหตุผล:</strong> ${b.cancelReason}</div>`:''}
    <table class="bd-table">
      ${b.items.map(it=>`<tr><td>${it.icon} ${it.name}${it.shots>0?` (+${it.shots} ช็อต)`:''}</td><td>×${it.qty}</td><td>฿${(it.unitPrice*it.qty).toLocaleString()}</td></tr>`).join('')}
    </table>
    <div class="bd-sep"></div>
    <div class="sum-row" style="margin-bottom:3px"><span style="font-size:13px;color:var(--text2)">ยอดรวม</span><span>฿${b.subtotal.toLocaleString()}</span></div>
    ${b.discount>0?`<div class="sum-row" style="margin-bottom:3px;color:var(--red)"><span style="font-size:13px">ส่วนลด</span><span>-฿${b.discount.toLocaleString()}</span></div>`:''}
    <div class="bd-total"><span>สุทธิ</span><span>฿${b.total.toLocaleString()}</span></div>
    ${!cancelled?`
    <div class="cancel-area">
      <label>ยกเลิกบิลนี้</label>
      <textarea class="cancel-reason" id="cancel-reason-input" rows="2" placeholder="ระบุเหตุผลการยกเลิก (จำเป็น)"></textarea>
      <button class="btn-danger" onclick="cancelBill('${b.id}')">❌ ยืนยันยกเลิกบิล</button>
    </div>`:''}
  `;
  document.getElementById('bd-overlay').classList.add('on');
}

function cancelBill(id){
  const reason=(document.getElementById('cancel-reason-input')?.value||'').trim();
  if(!reason){alert('❗ กรุณาระบุเหตุผลการยกเลิก');return;}
  const b=bills.find(x=>x.id===id);
  if(b){b.status='cancelled';b.cancelReason=reason;}
  save();
  document.getElementById('bd-overlay').classList.remove('on');
  renderBills('');
  alert('บิล '+id+' ถูกยกเลิกแล้ว');
}

// REPORT
function renderReport(){
  const today=todayStr();
  const todayBills=bills.filter(b=>b.date===today&&b.status==='ok');
  const total=todayBills.reduce((s,b)=>s+b.total,0);
  const cash=todayBills.filter(b=>b.method==='cash').reduce((s,b)=>s+b.total,0);
  const cashCount=todayBills.filter(b=>b.method==='cash').length;
  const transfer=todayBills.filter(b=>b.method==='transfer').reduce((s,b)=>s+b.total,0);
  const transferCount=todayBills.filter(b=>b.method==='transfer').length;
  const avg=todayBills.length?Math.round(total/todayBills.length):0;
  const itemCount={};
  todayBills.forEach(b=>b.items.forEach(it=>{itemCount[it.name]=(itemCount[it.name]||0)+it.qty;}));
  const topItems=Object.entries(itemCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxCount=topItems[0]?topItems[0][1]:1;

  document.getElementById('report-content').innerHTML=`
    <div class="report-date">📅 ${fmtDate(today)}</div>
    <div class="metric-grid">
      <div class="mcard"><div class="mlabel">ยอดขายวันนี้</div><div class="mval">฿${total.toLocaleString()}</div><div class="msub">${todayBills.length} บิล</div></div>
      <div class="mcard"><div class="mlabel">จำนวนบิล</div><div class="mval">${todayBills.length}</div><div class="msub">บิลที่สำเร็จ</div></div>
      <div class="mcard"><div class="mlabel">เฉลี่ยต่อบิล</div><div class="mval">฿${avg.toLocaleString()}</div><div class="msub">วันนี้</div></div>
    </div>
    <div class="section-title">ช่องทางการชำระเงิน</div>
    <div class="pay-split" style="margin-bottom:18px">
      <div class="pscard cash"><div class="ps-label">💵 เงินสด</div><div class="ps-val">฿${cash.toLocaleString()}</div><div class="ps-count">${cashCount} บิล</div></div>
      <div class="pscard transfer"><div class="ps-label">📱 โอนเงิน</div><div class="ps-val">฿${transfer.toLocaleString()}</div><div class="ps-count">${transferCount} บิล</div></div>
    </div>
    <div class="section-title">สินค้าขายดีวันนี้</div>
    ${topItems.length?topItems.map(([name,cnt],i)=>`
      <div class="ti-row">
        <span class="ti-rank">${i+1}.</span>
        <span class="ti-name">${name}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(cnt/maxCount*100)}%"></div></div>
        <span class="ti-cnt">${cnt} ชิ้น</span>
      </div>`).join(''):'<div style="color:var(--text3);font-size:13px;padding:1rem 0">ยังไม่มีข้อมูล</div>'}
    <div class="summary-box">
      <div class="summary-title">📢 สรุปยอดวันนี้ (${fmtDate(today)})</div>
      <div class="summary-body">
        รวมทั้งหมด: <strong>฿${total.toLocaleString()}</strong><br>
        💵 เงินสด: ฿${cash.toLocaleString()} (${cashCount} บิล) &nbsp;|&nbsp; 📱 โอน: ฿${transfer.toLocaleString()} (${transferCount} บิล)<br>
        จำนวนบิล: ${todayBills.length} บิล · เฉลี่ยบิลละ ฿${avg.toLocaleString()}
      </div>
    </div>
    <div style="margin-top:12px">
      <button class="export-btn" style="width:100%;justify-content:center" onclick="exportCSV()">📊 Export Excel รายวัน (${fmtDate(today)})</button>
    </div>
  `;
}

function exportCSV(){
  const today=todayStr();
  const todayBills=bills.filter(b=>b.date===today);
  if(!todayBills.length){alert('ไม่มีข้อมูลวันนี้');return;}
  let csv='\uFEFF';
  csv+='รหัสบิล,เวลา,รายการสินค้า,ยอดก่อนลด,ส่วนลด,ยอดสุทธิ,ช่องทางชำระ,สถานะ,เหตุผลยกเลิก\n';
  [...todayBills].sort((a,b)=>a.id.localeCompare(b.id)).forEach(b=>{
    const items=b.items.map(it=>`${it.name}${it.shots>0?`(+${it.shots}ช็อต)`:''} x${it.qty}`).join(' | ');
    const status=b.status==='cancelled'?'ยกเลิก':'สำเร็จ';
    const method=b.method==='cash'?'เงินสด':'โอนเงิน';
    csv+=`"${b.id}","${b.time}","${items}",${b.subtotal},${b.discount},${b.total},"${method}","${status}","${b.cancelReason||'-'}"\n`;
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`sales_${today}.csv`;a.click();
}

renderFooter();
</script>
</body>
</html>
